<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumen Pemantauan TKA 2026</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#067ac1', light: '#088de0', dark: '#05629b' },
                        secondary: { DEFAULT: '#f9a703', light: '#fbb72c', dark: '#d99002' },
                        slate: { 750: '#293548' }

    <script src="https://unpkg.com/lucide@latest"></script>

        .loader { border-top-color: #f9a703; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-slate-800 shadow-lg h-full flex flex-col z-10 transition-all duration-300 hidden md:flex absolute md:relative border-r dark:border-slate-700 flex-shrink-0" id="sidebar">
        <div class="p-6 border-b dark:border-slate-700 flex items-start justify-center relative bg-slate-50 dark:bg-slate-900">
            <div class="flex flex-col items-center w-full mt-2">
                <img src="logo pengawasan.png" alt="Logo Pengawasan" class="w-16 h-16 object-cover rounded-full shadow-sm border-2 border-white dark:border-slate-700 mb-3" onerror="this.outerHTML='<i data-lucide=\'clipboard-check\' class=\'w-12 h-12 text-primary dark:text-primary-light mb-3\'></i>'; lucide.createIcons();">
                <h1 class="text-sm font-bold text-gray-700 dark:text-gray-200 text-center uppercase tracking-wider">Pemantauan TKA</h1>
                <p class="text-[10px] text-gray-500 dark:text-gray-400 text-center mt-1 bg-gray-200 dark:bg-slate-700 px-3 py-0.5 rounded-full font-medium">Tahun 2026</p>
            </div>
            <button id="closeSidebarBtn" class="md:hidden text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 absolute top-4 right-4 focus:outline-none">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1" id="nav-menu">
                <!-- Navigasi di-generate via JS -->
            </ul>
        </nav>
        <div class="p-4 border-t dark:border-slate-700 text-xs text-gray-400 dark:text-gray-500 text-center">
            Versi Final (Master Data)<br>2026
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-x-hidden overflow-y-auto relative bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
        
        <div class="w-full bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-4 md:p-6 flex justify-center md:justify-start shadow-sm z-10 flex-shrink-0">
            <img src="Header Itjen Kemendikdasmen.png" alt="Header Itjen" class="w-full max-w-5xl h-auto object-contain object-left md:max-h-24 max-h-16 dark:hidden" onerror="this.outerHTML='<div class=\'w-full max-w-3xl h-16 md:h-24 px-4 flex items-center justify-center bg-gray-100 rounded-lg text-sm text-gray-500 font-medium border border-dashed border-gray-300 dark:hidden\'>[Gambar Header Itjen]</div>'">
            <img src="Header Itjen Kemendikdasmen Dark.png" alt="Header Itjen Dark" class="w-full max-w-5xl h-auto object-contain object-left md:max-h-24 max-h-16 hidden dark:block" onerror="this.outerHTML='<div class=\'w-full max-w-3xl h-16 md:h-24 px-4 items-center justify-center bg-slate-700 rounded-lg text-sm text-gray-400 font-medium border border-dashed border-gray-600 hidden dark:flex\'>[Gambar Header Itjen Dark]</div>'">
        </div>

        <header class="bg-white/90 backdrop-blur-md dark:bg-slate-800/90 shadow-sm border-b dark:border-slate-700 p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between z-0 transition-colors duration-300 sticky top-0 flex-shrink-0">
            <div class="flex items-center w-full sm:w-auto justify-between sm:justify-start mb-3 sm:mb-0">
                <div class="flex items-center">
                    <button id="menuBtn" class="mr-4 text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary-light md:hidden focus:outline-none">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-100" id="header-title">Informasi Umum</h2>
                </div>
            </div>
            <div class="flex items-center space-x-3 text-sm ml-10 sm:ml-0">
                <button id="themeToggleBtn" class="p-2 rounded-full text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-slate-700 transition-colors focus:outline-none" title="Ubah Tema">
                    <i data-lucide="moon" id="themeIconDark" class="w-5 h-5"></i>
                    <i data-lucide="sun" id="themeIconLight" class="w-5 h-5 hidden"></i>
                </button>
                <span class="bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-400 border border-green-200 dark:border-green-800 py-1 px-3 rounded-full font-medium flex items-center">
                    <i data-lucide="wifi" class="w-4 h-4 mr-1"></i> Online
                </span>
            </div>
        </header>

        <div class="flex-1 p-4 md:p-8 w-full max-w-5xl mx-auto">
            <form id="main-form" class="space-y-8 bg-white dark:bg-slate-800 p-6 md:p-8 rounded-xl shadow-sm border dark:border-slate-700 transition-colors duration-300">
                
                <div class="space-y-4 pb-6 border-b border-gray-200 dark:border-slate-700">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 flex items-center mb-4">
                        <i data-lucide="users" class="w-5 h-5 mr-2 text-primary dark:text-primary-light"></i> Identitas Tim Pemantau & Sasaran
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:col-span-2 p-4 bg-gray-50 dark:bg-slate-750 rounded-lg border border-gray-200 dark:border-slate-600">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Petugas 1 (Ketua Tim) *</label>
                                <input type="text" name="nama_petugas_1" required class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary" placeholder="Nama Petugas 1">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Petugas 2 (Opsional)</label>
                                <input type="text" name="nama_petugas_2" class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary" placeholder="Nama Petugas 2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Petugas 3 (Opsional)</label>
                                <input type="text" name="nama_petugas_3" class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary" placeholder="Nama Petugas 3">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Petugas 4 (Opsional)</label>
                                <input type="text" name="nama_petugas_4" class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary" placeholder="Nama Petugas 4">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tanggal Pemantauan *</label>
                            <input type="date" name="tanggal" id="tanggal" required class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Provinsi *</label>
                            <select name="provinsi" required class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary cursor-pointer">
                                <option value="">-- Pilih Provinsi --</option>
                                <option value="Maluku Utara">Maluku Utara</option>
                                <option value="Kalimantan Timur">Kalimantan Timur</option>
                                <option value="Sulawesi Tengah">Sulawesi Tengah</option>
                                <option value="Jambi">Jambi</option>
                                <option value="Lampung">Lampung</option>
                                <option value="Papua Barat Daya">Papua Barat Daya</option>
                                <option value="Kalimantan Tengah">Kalimantan Tengah</option>
                                <option value="Bali">Bali</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Kabupaten/Kota *</label>
                            <input type="text" name="kabkota" required class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary" placeholder="Misal: Kota Ternate">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nama Instansi/Sekolah Sasaran *</label>
                            <input type="text" name="nama_sasaran" required class="w-full border border-gray-300 dark:border-slate-600 rounded-lg p-2.5 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary" placeholder="Misal: SMP Negeri 1 Ternate">
                        </div>
                    </div>
                </div>

                <div id="questions-container">
                    <!-- Rendered via JS -->
                </div>

                <!-- Tombol Action Lengkap -->
                <div class="pt-6 border-t border-gray-200 dark:border-slate-700 flex flex-col-reverse sm:flex-row justify-between items-center gap-4 mt-8">
                    <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                        <button type="button" onclick="generatePDFReport(true)" class="bg-slate-100 hover:bg-slate-200 text-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-slate-200 font-medium py-2.5 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center border border-slate-300 dark:border-slate-600">
                            <i data-lucide="printer" class="w-5 h-5 mr-2"></i> Cetak Blanko Kosong
                        </button>
                        <button type="button" onclick="generatePDFReport(false)" class="bg-blue-50 hover:bg-blue-100 text-primary-dark dark:bg-primary-dark/20 dark:hover:bg-primary-dark/40 dark:text-primary-light font-medium py-2.5 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center border border-blue-200 dark:border-primary/30">
                            <i data-lucide="file-text" class="w-5 h-5 mr-2"></i> Cetak Laporan Terisi
                        </button>
                    </div>
                    <button type="submit" id="submitBtn" class="bg-secondary hover:bg-secondary-dark text-white font-medium py-2.5 px-8 rounded-lg shadow-sm transition-colors flex items-center justify-center w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2">
                        <i data-lucide="send" class="w-5 h-5 mr-2"></i> Kirim & Simpan
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="loadingModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-xl p-8 flex flex-col items-center shadow-2xl border dark:border-slate-700">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 dark:border-slate-600 h-12 w-12 mb-4"></div>
            <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100">Menyimpan Data...</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm text-center">Mohon tunggu, sedang mengirim/memperbarui data.</p>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-xl p-8 max-w-sm w-full mx-4 shadow-2xl text-center transform transition-all border dark:border-slate-700">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 dark:bg-green-900/30 mb-6 border border-green-200 dark:border-green-800/50">
                <i data-lucide="check" class="h-8 w-8 text-green-600 dark:text-green-400"></i>
            </div>
            <h3 class="text-xl font-medium text-gray-900 dark:text-white mb-2">Berhasil Disimpan!</h3>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Data telah dikirim. Lanjut ke instrumen berikutnya.</p>
            <button onclick="closeSuccessModal()" class="w-full inline-flex justify-center rounded-lg border border-transparent bg-primary dark:bg-primary px-4 py-2 text-base font-medium text-white hover:bg-primary-dark dark:hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 sm:text-sm transition-colors">
                Lanjutkan
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby52IF687IbilCPLMKHC9UTFJ3xyG9Qljyq8_xtc0B14V_Z4KwR0nnaOpKA9-OJXqG5/exec'; 
        let completedTabs = new Set();

        function initTheme() {
            const themeIconDark = document.getElementById('themeIconDark');
            const themeIconLight = document.getElementById('themeIconLight');
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeIconDark.classList.add('hidden');
                themeIconLight.classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                themeIconLight.classList.add('hidden');
                themeIconDark.classList.remove('hidden');
            }
        }

        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIconDark').classList.toggle('hidden', isDark);
            document.getElementById('themeIconLight').classList.toggle('hidden', !isDark);
        });

        initTheme();

        const instruments = [
            {
                id: 'dinas', title: 'Dinas Kab/Kota', icon: 'building-2',
                sections: [
                    {
                        title: 'A. Tata Kelola dan Koordinasi',
                        questions: [
                            { id: 'KAB-1.1', text: 'Apakah Panitia Penyelenggara TKA Tingkat Kabupaten/Kota (Dinas/Kemenag) sudah dibentuk dan memiliki Surat Keputusan (SK) resmi?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan / Tanggal SK:' },
                            { id: 'KAB-1.2', text: 'Apakah Dinas/Kemenag sudah melakukan sosialisasi kebijakan, jadwal, dan teknis pelaksanaan TKA kepada seluruh SD/MI dan SMP/MTs?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan / Arsip Undangan:' },
                            { id: 'KAB-1.3', text: 'Apakah ada surat edaran resmi yang mengatur batas kewajaran biaya untuk sekolah yang menumpang (resource sharing)?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'KAB-1.4', text: 'Apakah sudah ada koordinasi formal dengan pihak PLN dan penyedia internet (ISP) daerah untuk mencegah pemadaman selama hari ujian?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan / MoU:' },
                        ]
                    },
                    {
                        title: 'B. Penyiapan Instrumen Soal Daerah',
                        questions: [
                            { id: 'KAB-2.1', text: 'Apakah Dinas/Kemenag sudah membentuk Tim Penulis Soal TKA yang merekrut guru SD dan SMP yang berkompeten?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Jumlah Guru Penulis:' },
                            { id: 'KAB-2.2', text: 'Apakah seluruh penulis soal sudah menandatangani Pakta Integritas yang menjamin soal bebas plagiarisme dan tidak berafiliasi bimbel?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'KAB-2.3', text: 'Apakah jumlah paket soal yang dibuat sudah memenuhi syarat (ada paket utama, susulan, dan cadangan)?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'KAB-2.4', text: 'Apakah naskah draf soal daerah sudah diserahkan kepada Dinas Pendidikan Provinsi untuk ditelaah dan divalidasi mutunya?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan (No BAST):' },
                            { id: 'KAB-2.5', text: 'Apakah telah dilakukan proses telaah (review) soal oleh tim ahli/pengawas sebelum soal dirakit menjadi paket ujian?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' }
                        ]
                    },
                    {
                        title: 'C. Pengelolaan Data Peserta dan Sekolah',
                        questions: [
                            { id: 'KAB-3.1', text: 'Apakah penetapan sekolah penyelenggara (mandiri atau menumpang) sudah dilakukan berdasarkan verifikasi infrastruktur jaringan dan komputer?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Total Mandiri / Menumpang:' },
                            { id: 'KAB-3.2', text: 'Apakah proses verifikasi Daftar Nominasi Sementara (DNS) dan validasi SPTJM dari setiap sekolah sudah tuntas 100% di sistem pusat?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Persentase Penyelesaian:' },
                            { id: 'KAB-3.3', text: 'Apakah Daftar Nominasi Tetap (DNT) dan Kartu Peserta Ujian sudah dicetak dan didistribusikan ke sekolah-sekolah sebelum simulasi/gladi bersih dimulai?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' }
                        ]
                    },
                    {
                        title: 'D. SDM dan Penanganan Kendala Teknis',
                        questions: [
                            { id: 'KAB-4.1', text: 'Apakah SK Penugasan Pengawas Ruang sudah diterbitkan dengan sistem silang murni dan BUKAN guru mata pelajaran yang sedang diujikan?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'KAB-4.2', text: 'Apakah Posko Bantuan (Helpdesk) Tim Teknis tingkat Kabupaten/Kota sudah aktif dan memiliki kontak yang bisa dihubungi sekolah?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'KAB-4.3', text: 'Apakah Tim Teknis Kabupaten/Kota sudah memahami prosedur pengajuan dan siap melayani pembukaan Token Offline bagi daerah blank spot?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan Hasil Wawancara Singkat:' }
                        ]
                    }
                ]
            },
            {
                id: 'bpmp', title: 'Fungsi BPMP', icon: 'monitor-check',
                sections: [
                    {
                        title: 'A. Koordinasi dan Pemantauan Infrastruktur',
                        questions: [
                            { id: 'BPMP-1.1', text: 'Apakah BPMP telah berkoordinasi dengan Dinas Pendidikan Provinsi, Kabupaten/Kota, dan Kemenag wilayah setempat terkait persiapan TKA?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'BPMP-1.2', text: 'Bagaimana cara BPMP memantau kemajuan pendataan infrastruktur TIK (komputer, server, jaringan) SD dan SMP di laman manajemen TKA?', type: 'text', noteLabel: 'Persentase sekolah terdata (%):' },
                            { id: 'BPMP-1.3', text: 'Apakah BPMP memverifikasi dokumen "Surat Kesiapan" yang diunggah oleh SD/SMP pelaksana TKA di sistem?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'BPMP-1.4', text: 'Apakah BPMP memastikan seluruh SD/SMP sudah selesai mengatur status (mandiri/menumpang), moda (daring/semi daring), hingga pembagian sesi ujian?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                        ]
                    },
                    {
                        title: 'B. Pendampingan dan Pelaporan',
                        questions: [
                            { id: 'BPMP-2.1', text: 'Apakah BPMP memfasilitasi operasional Posko Pendampingan TKA Gabungan bersama pakar IT dari Provinsi dan Kabupaten/Kota?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'BPMP-2.2', text: 'Apakah BPMP melakukan pengawasan langsung ke lapangan (uji petik/kunjungan sampel) saat tahapan simulasi, gladi bersih, hingga hari pelaksanaan?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan Rute:' },
                            { id: 'BPMP-2.3', text: 'Apakah BPMP secara aktif memantau kelancaran sinkronisasi data (VHD) untuk sekolah yang memakai moda semi daring?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                            { id: 'BPMP-2.4', text: 'Apakah BPMP telah menyusun dan mengirimkan laporan hasil evaluasi (Monev) pelaksanaan gladi bersih?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },
                        ]
                    }
                ]
            },
            {
                id: 'sekolah', title: 'Satuan Pendidikan', icon: 'school',
                sections: [
                    {
                        title: 'A. Kepanitiaan, Sosialisasi, dan Anggaran',
                        questions: [
                            { id: 'SEK-1.1', text: 'Apakah Panitia Pelaksana TKA di sekolah (mencakup Kepsek, Proktor, Teknisi, Petugas Pendataan) sudah dibentuk melalui SK Kepala Sekolah?', type: 'radio', options: ['Ya', 'Tidak'], noteLabel: 'Catatan:' },

        let activeInstrumentId = 'dinas';

        function init() {
            document.getElementById('tanggal').valueAsDate = new Date();
            renderAllForms(); 
            switchTab(activeInstrumentId);
            setupSidebarToggle();
            
            document.getElementById('main-form').addEventListener('submit', handleFormSubmit);
            lucide.createIcons();
        }

        function renderNavigation() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';

            const activeClasses = "bg-primary/10 text-primary dark:bg-primary/20 dark:text-primary-light border-l-4 border-primary font-semibold";
            const inactiveClasses = "text-gray-600 dark:text-gray-400 border-l-4 border-transparent hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors";
            const completedClasses = "bg-secondary/20 text-secondary-dark dark:bg-secondary/20 dark:text-secondary border-l-4 border-secondary font-semibold";

            instruments.forEach(inst => {
                const li = document.createElement('li');
                const isActive = inst.id === activeInstrumentId;
                const isCompleted = completedTabs.has(inst.id);
                
                let liClass = inactiveClasses;
                let iconClass = "text-gray-400 dark:text-gray-500";

                if (isActive) {
                    liClass = activeClasses;
                    iconClass = "text-primary dark:text-primary-light";
                } else if (isCompleted) {
                    liClass = completedClasses;
                    iconClass = "text-secondary-dark dark:text-secondary";
                }
                
                let checkIcon = isCompleted ? `<i data-lucide="check-circle" class="w-4 h-4 ml-auto text-secondary dark:text-secondary"></i>` : '';

                li.innerHTML = `
                    <a href="#" onclick="switchTab('${inst.id}')" class="flex items-center px-6 py-3 text-sm cursor-pointer ${liClass}">
                        <i data-lucide="${inst.icon}" class="w-5 h-5 mr-3 ${iconClass}"></i>
                        <span class="flex-1">${inst.title}</span>
                        ${checkIcon}
                    </a>
                `;
                navMenu.appendChild(li);
            });
            lucide.createIcons();
        }

        function switchTab(id) {
            activeInstrumentId = id;
            renderNavigation();

            instruments.forEach(inst => {
                const wrapper = document.getElementById(`tab-content-${inst.id}`);
                if (wrapper) {
                    const isActive = inst.id === activeInstrumentId;
                    wrapper.classList.toggle('hidden', !isActive);
                    
                    const inputs = wrapper.querySelectorAll('[name$="_ans"]');
                    inputs.forEach(input => {
                        input.required = isActive;
                    });
                }
            });

            const activeInst = instruments.find(i => i.id === activeInstrumentId);
            document.getElementById('header-title').innerText = `Instrumen: ${activeInst.title}`;

            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
        }

        function renderAllForms() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            instruments.forEach(instrument => {
                const wrapper = document.createElement('div');
                wrapper.id = `tab-content-${instrument.id}`;
                wrapper.className = 'hidden'; 
                
                let html = '';
                instrument.sections.forEach(section => {
                    html += `<div class="bg-gray-50 dark:bg-slate-750 p-5 rounded-lg border border-gray-200 dark:border-slate-600 mb-8">`;
                    html += `<h4 class="font-semibold text-gray-800 dark:text-gray-100 mb-4 pb-2 border-b border-gray-200 dark:border-slate-600 text-lg">${section.title}</h4><div class="space-y-6">`;

                    section.questions.forEach((q, index) => {
                        html += `<div class="bg-white dark:bg-slate-800 p-4 rounded border dark:border-slate-600 shadow-sm">
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-200 mb-3">
                                <span class="bg-primary/10 dark:bg-primary-dark/50 text-primary-dark dark:text-primary-light text-xs font-bold px-2 py-1 rounded mr-2">${q.id}</span>
                                ${q.text} <span class="text-red-500">*</span>
                            </p>
                            <div class="flex flex-col md:flex-row md:items-start gap-4">
                        `;

                        if (q.type === 'radio') {
                            html += `<div class="flex flex-col sm:flex-row flex-wrap gap-4 w-full md:w-1/2 pt-1">`;
                            q.options.forEach(opt => {
                                html += `
                                    <label class="inline-flex items-center cursor-pointer bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 px-3 py-2 rounded-md hover:bg-primary/5 dark:hover:bg-slate-600 transition-colors">
                                        <input type="radio" name="${q.id}_ans" value="${opt}" class="w-4 h-4 text-primary dark:text-primary-light bg-white dark:bg-slate-800 border-gray-300 dark:border-slate-500 focus:ring-primary focus:ring-offset-1 dark:focus:ring-offset-slate-800">
                                        <span class="ml-2 text-sm text-gray-700 dark:text-gray-300 whitespace-nowrap">${opt}</span>
                                    </label>
                                `;
                            });
                            html += `</div>`;
                        } else if (q.type === 'short_text') {
                            html += `
                                <div class="w-full md:w-1/2">
                                    <input type="text" name="${q.id}_ans" class="w-full border border-gray-300 dark:border-slate-600 rounded-md p-2.5 text-sm bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary placeholder-gray-400 dark:placeholder-gray-500" placeholder="Ketik jawaban di sini...">
                                </div>
                            `;
                        } else if (q.type === 'text') {
                            html += `
                                <div class="w-full md:w-1/2">
                                    <textarea name="${q.id}_ans" class="w-full border border-gray-300 dark:border-slate-600 rounded-md p-2 text-sm bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary placeholder-gray-400 dark:placeholder-gray-500" rows="3" placeholder="Tulis rincian jawaban di sini..."></textarea>
                                </div>
                            `;
                        }

                        html += `
                                <div class="w-full md:w-1/2">
                                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">${q.noteLabel}</label>
                                    <textarea name="${q.id}_note" class="w-full border border-gray-300 dark:border-slate-600 rounded-md p-2 text-sm bg-gray-50 dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-primary focus:border-primary placeholder-gray-400 dark:placeholder-gray-500" rows="${q.type === 'text' ? '3' : '2'}" placeholder="Tambahkan temuan teknis/bukti (Opsional)..."></textarea>
                                </div>
                            </div>
                        </div>`;
                    });

                    html += `</div></div>`;
                });
                wrapper.innerHTML = html;
                container.appendChild(wrapper);
            });
        }

        function setupSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            document.getElementById('menuBtn').addEventListener('click', () => {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('absolute', 'z-40');
            });
            document.getElementById('closeSidebarBtn').addEventListener('click', () => {
                sidebar.classList.add('hidden');
            });
        }

                <style>
                    body { font-family: 'Arial', sans-serif; line-height: 1.5; color: #000; padding: 20px; font-size: 14px; }
                    .header-img { width: 100%; max-height: 90px; object-fit: contain; margin-bottom: 20px; border-bottom: 3px solid #067ac1; padding-bottom: 15px; }
                    .title { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 30px; text-transform: uppercase;}
                    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
                    th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; vertical-align: top; }
                    th { background-color: #f0f0f0; width: 35%; }
                    .section-title { background-color: #067ac1; color: white; padding: 8px 12px; font-size: 15px; font-weight: bold; margin-top: 25px; margin-bottom: 15px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                    .question-block { page-break-inside: avoid; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 15px; }
                    .q-text { font-weight: bold; margin-bottom: 8px; }
                    .q-id { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 8px; border: 1px solid #ccc; }
                    .options { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 20px;}
                    .opt-item { display: inline-flex; items-center; }
                    .text-box { border: 1px solid #666; min-height: 60px; padding: 10px; margin-top: 5px; background: ${isBlank ? '#fff' : '#fafafa'}; }
                    .note-box { font-style: italic; color: #444; font-size: 13px; margin-top: 8px; }
                    .signature-area { margin-top: 50px; text-align: right; padding-right: 50px; page-break-inside: avoid;}
                </style>
            </head>
            <body>
            `;
            
            // Header Image (Memanggil gambar lokal)
            html += `<img src="Header Itjen Kemendikdasmen.png" class="header-img" onerror="this.style.display='none'" />`;
            html += `<div class="title">INSTRUMEN PEMANTAUAN TKA TAHUN 2026<br>KATEGORI: ${activeInst.title}</div>`;
            
            // Gabung Nama Petugas
            let petugas = [formData.get('nama_petugas_1'), formData.get('nama_petugas_2'), formData.get('nama_petugas_3'), formData.get('nama_petugas_4')].filter(Boolean).join(', ');

            // Identitas Tabel
            html += `<table>
                <tr><th>Tanggal Pemantauan</th><td>${isBlank ? '' : (formData.get('tanggal') || '')}</td></tr>
                <tr><th>Provinsi</th><td>${isBlank ? '' : (formData.get('provinsi') || '')}</td></tr>
                <tr><th>Kabupaten/Kota</th><td>${isBlank ? '' : (formData.get('kabkota') || '')}</td></tr>
                <tr><th>Nama Instansi/Sasaran</th><td>${isBlank ? '' : (formData.get('nama_sasaran') || '')}</td></tr>
                <tr><th>Tim Petugas</th><td>${isBlank ? '' : petugas}</td></tr>
            </table>`;
            
            // Pertanyaan
            activeInst.sections.forEach(sec => {
                html += `<div class="section-title">${sec.title}</div>`;
                sec.questions.forEach(q => {
                    html += `<div class="question-block">`;
                    html += `<div class="q-text"><span class="q-id">${q.id}</span> ${q.text}</div>`;
                    
                    let valAns = isBlank ? '' : formData.get(`${q.id}_ans`) || '';
                    let valNote = isBlank ? '' : formData.get(`${q.id}_note`) || '';

                    if (q.type === 'radio') {
                        let optsHtml = q.options.map(opt => {
                            let checked = (!isBlank && valAns === opt) ? '☑' : '☐';
                            return `<div class="opt-item"><span style="font-size:18px; margin-right:5px;">${checked}</span> ${opt}</div>`;
                        }).join('');
                        html += `<div class="options">${optsHtml}</div>`;
                    } else if (q.type === 'short_text' || q.type === 'text') {
                        html += `<div class="text-box">${isBlank ? '' : valAns.replace(/\\n/g, '<br>')}</div>`;
                    }
                    
                    html += `<div class="note-box"><b>${q.noteLabel}</b> ${isBlank ? '.........................................................................................' : valNote}</div>`;
                    html += `</div>`;
                });
            });

            html += `<div class="signature-area">
                <p>Petugas Pemantau,</p>
                <br><br><br><br>
                <p><b>${isBlank ? '( .............................................. )' : (formData.get('nama_petugas_1') || '( .............................................. )')}</b></p>
            </div>`;

            html += `
                <script>
                    window.onload = function() {
                        setTimeout(function() {
                            window.print();
                            window.close();
                        }, 500); // Tunggu setengah detik agar gambar header termuat
                    };
                <\/script>
            </body>
            </html>`;
            
            printWin.document.open();
            printWin.document.write(html);
            printWin.document.close();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const activeInst = instruments.find(i => i.id === activeInstrumentId);
            
            const petugasArray = [
                formData.get('nama_petugas_1'),
                formData.get('nama_petugas_2'),
                formData.get('nama_petugas_3'),
                formData.get('nama_petugas_4')
            ];
            const petugasGabungan = petugasArray.filter(name => name && name.trim() !== '').join(', ');

            const data = {
                timestamp: new Date().toISOString(),
                petugas: petugasGabungan,
                tanggal: formData.get('tanggal'),
                provinsi: formData.get('provinsi'),
                kabkota: formData.get('kabkota'),
                sasaran: formData.get('nama_sasaran'),
                kategori: activeInst.title,
                jawaban: []
            };

            activeInst.sections.forEach(sec => {
                sec.questions.forEach(q => {
                    data.jawaban.push({
                        kode: q.id,
                        pertanyaan: q.text,
                        status: formData.get(`${q.id}_ans`) || '',
                        catatan: formData.get(`${q.id}_note`) || ''
                    });
                });
            });

            document.getElementById('loadingModal').classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                document.getElementById('loadingModal').classList.add('hidden');
                document.getElementById('successModal').classList.remove('hidden');
                
                completedTabs.add(activeInstrumentId);
                renderNavigation();
                
            } catch (error) {
                console.error('Error!', error.message);
                document.getElementById('loadingModal').classList.add('hidden');
                alert("Terjadi kesalahan saat mengirim data. Pastikan koneksi internet stabil.");
            }
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.add('hidden');
            window.scrollTo(0, 0);

            const currentIndex = instruments.findIndex(i => i.id === activeInstrumentId);
            if (currentIndex < instruments.length - 1) {
                const nextId = instruments[currentIndex + 1].id;
                switchTab(nextId);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
